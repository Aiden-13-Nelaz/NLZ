<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Geral de Moderação - Mestre</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #111827; color: white; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        header { border-bottom: 2px solid #1f2937; padding-bottom: 20px; margin-bottom: 30px; }
        h1 { font-size: 24px; font-weight: 800; color: #f3f4f6; }
        .card-admin {
            background: #1f2937;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .badge-destino {
            background: #3b82f6;
            color: white;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 10px;
            display: inline-block;
            margin-bottom: 10px;
        }
        .btn-delete {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ef4444;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>👑 Painel de Programador</h1>
            <p style="color: #9ca3af; font-size: 14px; margin-top: 5px;">Acesso Global & Moderação Ativa</p>
        </header>
        <div id="lista-global"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC-lqXlJQ5v_7yM3_bHq7D-V6ZExB_eO6Q", 
            authDomain: "mensagens-anonimas-ca16f.firebaseapp.com",
            databaseURL: "https://mensagens-anonimas-ca16f-default-rtdb.firebaseio.com",
            projectId: "mensagens-anonimas-ca16f",
            storageBucket: "mensagens-anonimas-ca16f.appspot.com",
            messagingSenderId: "168390794379",
            appId: "1:168390794379:web:9f0e362844529093cb888e"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        database.ref('mensagens').on('value', function(snapshot) {
            const painel = document.getElementById('lista-global');
            painel.innerHTML = "";
            const arrayCompleto = [];

            snapshot.forEach(function(userSnapshot) {
                const usuarioDono = userSnapshot.key;
                
                userSnapshot.forEach(function(msgSnapshot) {
                    const idMsg = msgSnapshot.key;
                    const dados = msgSnapshot.val();

                    const html = `
                        <div class="card-admin">
                            <span class="badge-destino">Para: @${usuarioDono}</span>
                            <p style="color: #e5e7eb; font-size: 15px; margin-top:5px; padding-right:70px;">${dados.texto}</p>
                            <button class="btn-delete" onclick="deletarMestre('${usuarioDono}', '${idMsg}')">Apagar</button>
                        </div>
                    `;
                    arrayCompleto.push({ html: html, time: dados.timestamp || 0 });
                });
            });

            arrayCompleto.sort((a,b) => b.time - a.time);
            if(arrayCompleto.length === 0) {
                painel.innerHTML = "<p style='text-align:center;color:#6b7280;'>Nenhuma atividade na rede.</p>";
            } else {
                arrayCompleto.forEach(item => painel.innerHTML += item.html);
            }
        });

        // FUNÇÃO COM A TUA SENHA PESSOAL DEFINIDA
        function deletarMestre(usuario, id) {
            const pass = prompt("Introduz o código master para confirmar a eliminação:");
            
            // Aqui está a tua senha gravada no código
            if(pass === "190910") {
                if (confirm(`Tens a certeza que queres apagar a mensagem de @${usuario}?`)) {
                    database.ref('mensagens/' + usuario + '/' + id).remove();
                    alert("Mensagem expurgada da base de dados!");
                }
            } else {
                alert("Código inválido! Apenas o programador pode apagar.");
            }
        }
    </script>
</body>
</html>
